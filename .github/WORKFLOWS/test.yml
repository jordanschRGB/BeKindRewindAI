name: test
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install -e . 2>/dev/null || echo "No setup.py, skipping install"
      
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true
        
      - name: Generate coverage summary
        if: always()
        run: |
          echo "=========================================="
          echo "           COVERAGE SUMMARY               "
          echo "=========================================="
          if [ -f coverage.xml ]; then
            python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import sys
          
          try:
              tree = ET.parse('coverage.xml')
              root = tree.getroot()
              coverage = root.get('line-rate')
              if coverage:
                  percentage = float(coverage) * 100
                  print(f"Overall Line Coverage: {percentage:.2f}%")
                  
                  # Count files
                  packages = root.findall('.//package')
                  total_files = 0
                  for pkg in packages:
                      classes = pkg.findall('.//class')
                      total_files += len(classes)
                  print(f"Files analyzed: {total_files}")
              else:
                  print("Could not find coverage rate in report")
          except Exception as e:
              print(f"Error parsing coverage: {e}")
              sys.exit(0)
          PYEOF
          else
            echo "No coverage.xml file found"
          fi
          echo "=========================================="
        
      - name: Test summary
        if: always()
        run: |
          echo "Test run complete. Check logs above for failures."
