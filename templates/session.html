{% extends "base.html" %}
{% block content %}
<h1>Recording Session</h1>

<div id="no-session">
    <div class="mv-card" style="max-width:400px;">
        <label>How many tapes?</label>
        <input type="number" id="tape-count" value="1" min="1" max="20" style="margin-bottom:1.5rem;">
        <button class="primary mv-btn-big" onclick="startSession()" style="width:100%;">Start Session</button>
    </div>
</div>

<div id="active-session" style="display:none;">
    <div class="mv-card" style="text-align:center; padding:2rem;">
        <h2 id="session-title" style="margin-top:0;">Tape 0 of 0</h2>
        <div class="mv-recording-state" id="session-state"></div>
    </div>

    <div id="session-controls" style="display:flex; gap:1rem; margin:1.5rem 0; flex-wrap:wrap;">
        <button class="primary mv-btn-big" id="btn-next" onclick="nextTape()" style="flex:1;">Next Tape Ready</button>
        <button class="danger" id="btn-stop" onclick="stopRecording()">Stop Recording</button>
    </div>

    <h3>Tapes</h3>
    <div class="mv-card">
        <table>
            <thead><tr><th>#</th><th>Status</th><th>Duration</th></tr></thead>
            <tbody id="tape-list"></tbody>
        </table>
        <div id="tape-empty" class="mv-empty" style="padding:1.5rem;">
            <p>No tapes recorded yet. Click "Next Tape Ready" to begin.</p>
        </div>
    </div>
</div>

<script>
let pollInterval = null;

function startSession() {
    const count = parseInt(document.getElementById("tape-count").value);
    fetch("/api/session/start", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({tape_count: count}) })
        .then(r => r.json()).then(data => {
            document.getElementById("no-session").style.display = "none";
            document.getElementById("active-session").style.display = "block";
            updateSession(data);
            pollInterval = setInterval(pollSession, 1000);
        });
}

function nextTape() { fetch("/api/session/next", {method: "POST"}).then(r => r.json()).then(updateSession); }
function stopRecording() { fetch("/api/session/stop", {method: "POST"}).then(r => r.json()).then(updateSession); }

function pollSession() {
    fetch("/api/session/current").then(r => { if (!r.ok) throw "no"; return r.json(); }).then(updateSession).catch(() => clearInterval(pollInterval));
}

function updateSession(data) {
    document.getElementById("session-title").textContent = "Tape " + data.current_tape + " of " + data.tape_count;

    const el = document.getElementById("session-state");
    const map = {
        waiting: ["Load next tape and click 'Next Tape Ready'", "status-done"],
        recording: ["Recording...", "status-recording"],
        encoding: ["Encoding to MP4...", "status-encoding"],
        validating: ["Validating...", "status-encoding"],
        done: ["All tapes done!", "status-done"],
        error: ["Error: " + (data.error||""), "status-error"],
    };
    const [t, c] = map[data.state] || [data.state, ""];
    el.textContent = t;
    el.className = "mv-recording-state " + c;

    document.getElementById("btn-next").style.display = data.state === "waiting" && data.current_tape < data.tape_count ? "" : "none";
    document.getElementById("btn-stop").style.display = data.state === "recording" ? "" : "none";

    const tbody = document.getElementById("tape-list");
    const empty = document.getElementById("tape-empty");
    tbody.innerHTML = "";

    if ((data.tapes||[]).length > 0) {
        empty.style.display = "none";
        data.tapes.forEach(t => {
            const tr = document.createElement("tr");
            const dur = t.validation?.duration_seconds ? Math.floor(t.validation.duration_seconds/60) + " min" : "-";
            tr.innerHTML = "<td>" + t.number + "</td><td>" + t.status + "</td><td>" + dur + "</td>";
            tbody.appendChild(tr);
        });
    } else {
        empty.style.display = "block";
    }

    if (data.state === "done") clearInterval(pollInterval);
}
</script>
{% endblock %}
