# Pre-commit hooks configuration for BeKindRewindAI
#
# INSTALLATION:
#   pip install pre-commit
#   pre-commit install
#
# USAGE:
#   pre-commit run --all-files    # Run all hooks manually
#   pre-commit run black          # Run specific hook
#
# The hooks will run automatically on each git commit.
# To skip hooks temporarily: git commit --no-verify

repos:
  # Black - Python code formatter
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=88]

  # Flake8 - Python linter
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=88, --extend-ignore=E203,W503]

  # Pytest - Run tests before commit
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest
        language: system
        pass_filenames: false
        always_run: true
        args: [tests/]
